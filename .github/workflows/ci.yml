name: CI — Quality Gate

# ┌──────────────────────────────────────────────────────────────────────┐
# │  Runs on every push to integration and every PR to main/integration  │
# │  Must pass before merging. Fast feedback (~5 min).                   │
# │                                                                      │
# │  2 independent job tracks (run in parallel):                         │
# │    1. Mobile: typecheck → unit tests                                 │
# │    2. Backend: postgres + redis → migrate → vitest                   │
# │  Screen tests disabled until UI is finalized (Sprint 5+).           │
# │  Final gate job checks all results.                                  │
# └──────────────────────────────────────────────────────────────────────┘

on:
  push:
    branches: [integration]
  pull_request:
    branches: [main, integration]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Mobile: TypeScript + Tests ─────────────────────────────────────
  mobile:
    name: 📱 Mobile (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: mobile-node-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: mobile-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests (stores + API functions)
        run: npx jest tests/unit --no-coverage --ci

      # Screen tests disabled — UI not finalized yet, re-enable in Sprint 5+
      # - name: Screen tests (component rendering)
      #   run: npx jest --config jest.screens.config.js --no-coverage --ci

      - name: Summary
        if: always()
        run: |
          echo "## 📱 Mobile Results" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript strict check" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: stores, API functions, hooks" >> $GITHUB_STEP_SUMMARY

  # ── Backend: Tests with real Postgres + Redis ──────────────────────
  backend:
    name: 🖥️ Backend (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eclean
          POSTGRES_PASSWORD: eclean_ci
          POSTGRES_DB: eclean_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://eclean:eclean_ci@localhost:5432/eclean_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-test-jwt-access-secret-that-is-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-that-is-at-least-32-characters-long
      BCRYPT_ROUNDS: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-node-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: backend-node-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run backend tests
        run: npm test

      - name: Summary
        if: always()
        run: |
          echo "## 🖥️ Backend Results" >> $GITHUB_STEP_SUMMARY
          echo "- Vitest against real PostgreSQL 16 + Redis 7" >> $GITHUB_STEP_SUMMARY
          echo "- Prisma migrations applied to fresh database" >> $GITHUB_STEP_SUMMARY

  # ── Final gate: all checks must pass ───────────────────────────────
  ci-passed:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [mobile, backend]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile (typecheck + tests) | ${{ needs.mobile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (tests) | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.mobile.result }}" != "success" ]] || \
             [[ "${{ needs.backend.result }}" != "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **CI failed — fix issues before merging**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All checks passed — safe to merge**" >> $GITHUB_STEP_SUMMARY
