name: CI — Quality Gate

# ┌─────────────────────────────────────────────────────────────────────┐
# │  Runs on every push to integration and every PR to main/integration │
# │  Must pass before merging. Fast feedback (~5 min).                  │
# │                                                                     │
# │  Jobs: lint → typecheck → mobile tests + backend tests (parallel)   │
# └─────────────────────────────────────────────────────────────────────┘

on:
  push:
    branches: [integration]
  pull_request:
    branches: [main, integration]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: Fast checks (lint + types) ─────────────────────────────
  lint-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: mobile-node-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: mobile-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: ESLint
        run: npm run lint || true
        # Note: `|| true` because ESLint may have warnings we don't want to block on yet.
        # Remove `|| true` once lint is fully clean.

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Step 2a: Mobile tests (after lint passes) ──────────────────────
  test-mobile:
    name: 📱 Mobile Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: mobile-node-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: mobile-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests (stores + API functions)
        run: npx jest tests/unit --no-coverage --ci

      - name: Run screen tests (component rendering)
        run: npx jest --config jest.screens.config.js --no-coverage --ci

      - name: Test summary
        if: always()
        run: |
          echo "## 📱 Mobile Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: stores, API functions, hooks" >> $GITHUB_STEP_SUMMARY
          echo "- Screen tests: component rendering with React Native Testing Library" >> $GITHUB_STEP_SUMMARY

  # ── Step 2b: Backend tests (parallel with mobile tests) ────────────
  test-backend:
    name: 🖥️ Backend Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eclean
          POSTGRES_PASSWORD: eclean_ci
          POSTGRES_DB: eclean_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://eclean:eclean_ci@localhost:5432/eclean_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-test-jwt-access-secret-that-is-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-that-is-at-least-32-characters-long
      BCRYPT_ROUNDS: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-node-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: backend-node-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run backend tests
        run: npm test

      - name: Test summary
        if: always()
        run: |
          echo "## 🖥️ Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Framework: Vitest" >> $GITHUB_STEP_SUMMARY
          echo "- Database: PostgreSQL 16 (CI service)" >> $GITHUB_STEP_SUMMARY
          echo "- Cache: Redis 7 (CI service)" >> $GITHUB_STEP_SUMMARY

  # ── Final gate: all checks must pass ───────────────────────────────
  ci-passed:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test-mobile, test-backend]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile Tests | ${{ needs.test-mobile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.lint-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test-mobile.result }}" != "success" ]] || \
             [[ "${{ needs.test-backend.result }}" != "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **CI failed — fix issues before merging**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All checks passed — safe to merge**" >> $GITHUB_STEP_SUMMARY
