name: Maestro E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  WORKER_EMAIL: maestro-worker@eclean.test
  BUYER_EMAIL: maestro-buyer@eclean.test
  PASSWORD: Test@1234

permissions:
  contents: read
  checks: write

jobs:
  jest:
    name: Jest Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Unit tests
        run: npx jest tests/unit --no-coverage --ci
      - name: Screen tests
        run: npx jest --config jest.screens.config.js --no-coverage --ci
      - name: Integration tests (live backend)
        env:
          TEST_API_URL: https://ecleanfuture-production.up.railway.app/api/v1
        run: npx jest tests/integration --no-coverage --ci

  maestro:
    name: Maestro E2E
    runs-on: ubuntu-latest
    needs: jest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Create test accounts
        run: |
          curl -sf -X POST https://ecleanfuture-production.up.railway.app/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$WORKER_EMAIL\",\"password\":\"$PASSWORD\",\"name\":\"CI Worker\",\"role\":\"WORKER\"}" || true
          curl -sf -X POST https://ecleanfuture-production.up.railway.app/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$BUYER_EMAIL\",\"password\":\"$PASSWORD\",\"name\":\"CI Buyer\",\"role\":\"BUYER\"}" || true

      - name: Patch react-native-svg for RN 0.76 (StyleSizeLength → StyleLength)
        working-directory: mobile
        run: |
          FILE="node_modules/react-native-svg/common/cpp/react/renderer/components/rnsvg/RNSVGLayoutableShadowNode.cpp"
          sed -i 's/yoga::StyleSizeLength/yoga::StyleLength/g' "$FILE"
          echo "Patched:"
          grep -n "StyleLength\|StyleSizeLength" "$FILE"

      - name: Generate android/ with expo prebuild
        working-directory: mobile
        env:
          NODE_ENV: production
        run: npx expo prebuild --platform android --clean --no-install

      - name: Show build.gradle (debug what was generated)
        working-directory: mobile/android/app
        run: |
          echo "=== build.gradle line 10-25 ==="
          sed -n '10,25p' build.gradle

      - name: Patch RN 0.76 build.gradle issues
        working-directory: mobile/android
        run: |
          # Remove enableBundleCompression which was removed in RN 0.76
          sed -i '/enableBundleCompression/d' app/build.gradle
          echo "Patched enableBundleCompression"

          # Show patched area
          echo "=== app/build.gradle after patch ==="
          cat app/build.gradle | head -30

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          # Run with full output so we can see exactly what fails
          ./gradlew assembleDebug --no-daemon --warning-mode=none 2>&1 | grep -E "FAILED|error:|Error:|Exception|BUILD" | head -30
          ./gradlew assembleDebug --no-daemon --warning-mode=none
          
          # Find and copy APK
          APK=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          echo "APK found: $APK"
          cp "$APK" ../eclean.apk
          ls -lh ../eclean.apk

      - name: Upload APK artifact (download from Actions tab → install on phone)
        uses: actions/upload-artifact@v4
        with:
          name: eclean-debug-apk
          path: mobile/eclean.apk
          retention-days: 7

      - name: Run Maestro smoke + flow tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_4
          ram-size: 3072M
          heap-size: 512M
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            adb install -r $GITHUB_WORKSPACE/mobile/eclean.apk
            sleep 3
            mkdir -p $GITHUB_WORKSPACE/maestro-results

            MAESTRO_FAILED=0

            maestro test $GITHUB_WORKSPACE/maestro/flows/09_smoke_all_tabs.yaml --env WORKER_EMAIL=$WORKER_EMAIL --env BUYER_EMAIL=$BUYER_EMAIL --env PASSWORD=$PASSWORD --format junit --output $GITHUB_WORKSPACE/maestro-results/smoke-worker.xml || MAESTRO_FAILED=1

            maestro test $GITHUB_WORKSPACE/maestro/flows/10_smoke_buyer_tabs.yaml --env WORKER_EMAIL=$WORKER_EMAIL --env BUYER_EMAIL=$BUYER_EMAIL --env PASSWORD=$PASSWORD --format junit --output $GITHUB_WORKSPACE/maestro-results/smoke-buyer.xml || MAESTRO_FAILED=1

            maestro test $GITHUB_WORKSPACE/maestro/flows/01_worker_login.yaml --env WORKER_EMAIL=$WORKER_EMAIL --env PASSWORD=$PASSWORD --format junit --output $GITHUB_WORKSPACE/maestro-results/01-worker-login.xml || MAESTRO_FAILED=1

            maestro test $GITHUB_WORKSPACE/maestro/flows/03_buyer_login_post_task.yaml --env BUYER_EMAIL=$BUYER_EMAIL --env PASSWORD=$PASSWORD --format junit --output $GITHUB_WORKSPACE/maestro-results/03-buyer-post-task.xml || MAESTRO_FAILED=1

            if [ $MAESTRO_FAILED -eq 1 ]; then
              echo "❌ One or more Maestro flows failed — check maestro-results artifacts"
              exit 1
            fi

      - name: Upload Maestro results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-e2e-results
          path: |
            ${{ github.workspace }}/maestro-results/
            ~/.maestro/tests/
          retention-days: 14

      - name: Publish test report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ${{ github.workspace }}/maestro-results/**/*.xml
          check_name: Maestro E2E Results
