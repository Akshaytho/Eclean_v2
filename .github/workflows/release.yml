name: Release — Build + Publish

# ┌───────────────────────────────────────────────────────────────────┐
# │  Creates a GitHub Release with the APK attached.                  │
# │                                                                   │
# │  Flow: CI checks (parallel) → Build APK → Create Release         │
# │  Nothing ships without passing TypeScript + all tests first.      │
# │                                                                   │
# │  How to use:                                                      │
# │    git tag v1.0.0                                                 │
# │    git push origin v1.0.0                                         │
# │                                                                   │
# │  OR: trigger manually from Actions tab → "Release" → Run          │
# └───────────────────────────────────────────────────────────────────┘

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0-beta.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Step 1: Run CI checks (same as Quality Gate) ─────���───────────
  ci-mobile:
    name: 📱 Mobile checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: mobile-node-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: mobile-node-
      - run: npm install --legacy-peer-deps
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx jest tests/unit --no-coverage --ci

  ci-backend:
    name: 🖥️ Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eclean
          POSTGRES_PASSWORD: eclean_ci
          POSTGRES_DB: eclean_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://eclean:eclean_ci@localhost:5432/eclean_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-test-jwt-access-secret-that-is-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-that-is-at-least-32-characters-long
      BCRYPT_ROUNDS: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-node-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: backend-node-
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm test

  # ── Step 2: Build APK + Create Release (only if CI passes) ──────
  release:
    name: 🚀 Build & Release APK
    runs-on: ubuntu-latest
    needs: [ci-mobile, ci-backend]
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release: $VERSION"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: mobile-node-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: mobile-node-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/.gradle
          key: gradle-${{ hashFiles('mobile/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Patch react-native-svg (RN 0.81 fix)
        working-directory: mobile
        run: |
          FILE="node_modules/react-native-svg/common/cpp/react/renderer/components/rnsvg/RNSVGLayoutableShadowNode.cpp"
          if [ -f "$FILE" ]; then
            sed -i 's/yoga::StyleLength/yoga::StyleSizeLength/g' "$FILE"
            echo "SVG patch applied"
          fi

      - name: Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch build.gradle
        working-directory: mobile
        run: sed -i '/enableBundleCompression/d' android/app/build.gradle

      - name: Bundle JavaScript
        working-directory: mobile
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file node_modules/expo/AppEntry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=none --stacktrace 2>&1 | \
            grep -E "^> Task|FAILED|error:|Error:|Exception|BUILD SUCCESS|BUILD FAILED" | \
            grep -v "UP-TO-DATE\|FROM-CACHE"
          APK=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          cp "$APK" ../eclean-${{ steps.version.outputs.version }}.apk
          ls -lh ../eclean-${{ steps.version.outputs.version }}.apk

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${{ steps.version.outputs.version }}" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD | head -30)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          cat > /tmp/changelog.md << 'HEADER'
          ## What's in this release

          HEADER
          echo "$COMMITS" >> /tmp/changelog.md
          cat >> /tmp/changelog.md << 'FOOTER'

          ---

          ### Install on Android
          1. Download the `.apk` file below
          2. On your phone: Settings → Security → Allow Unknown Sources
          3. Open the downloaded APK → Install
          FOOTER

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: eClean ${{ steps.version.outputs.version }}
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          files: mobile/eclean-${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        if: always()
        run: |
          echo "## eClean Release — ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "mobile/eclean-${{ steps.version.outputs.version }}.apk" ]; then
            SIZE=$(du -sh "mobile/eclean-${{ steps.version.outputs.version }}.apk" | cut -f1)
            echo "APK built — Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "Build failed" >> $GITHUB_STEP_SUMMARY
          fi
