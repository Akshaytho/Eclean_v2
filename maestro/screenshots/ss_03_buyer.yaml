# SCREENSHOT FLOW: Buyer Screens
# Captures every buyer screen after login

appId: com.eclean.app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- tapOn:
    text: "Skip"
    optional: true
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 30000

# Login as buyer
- tapOn:
    text: "Email"
- inputText: "${BUYER_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${PASSWORD}"
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "Post New Task"
    timeout: 40000

# Buyer Home
- takeScreenshot: "09_buyer_home"

# Post Task - Step 1
- tapOn: "Post New Task"
- waitForAnimationToEnd
- takeScreenshot: "10_post_task_step1"

# Go back
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    description: "back"
    optional: true

# My Tasks tab
- tapOn: "My Tasks"
- waitForAnimationToEnd
- takeScreenshot: "11_buyer_tasks"

# Notifications tab
- tapOn: "Notifications"
- waitForAnimationToEnd
- takeScreenshot: "12_buyer_notifications"

# Profile tab
- tapOn: "Profile"
- waitForAnimationToEnd
- takeScreenshot: "13_buyer_profile"
