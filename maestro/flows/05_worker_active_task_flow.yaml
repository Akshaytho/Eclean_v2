# FLOW 5: Worker Active Task — Start, Upload Photos, Submit
# Tests: accepted task → start → upload photos → review → submit
# NOTE: Run after flow 04 (worker has accepted task)

appId: com.eclean.app
---
- launchApp:
    clearState: false
- assertVisible: "Sign In"

# Worker login
- tapOn:
    text: "Email"
- inputText: "${WORKER_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${PASSWORD}"
- tapOn: "Sign In"

# Active task banner should be on Home
- assertVisible:
    text: "ACTIVE TASK"

# Tap banner → ActiveTask screen
- tapOn: "ACTIVE TASK"
- assertVisible: "Start Work"

# Start the task
- tapOn: "Start Work"
- assertVisible:
    text: "Before"

# Upload Before photo (picks from library)
- tapOn: "Before"
- assertVisible: "Add Photo"
- tapOn: "Photo Library"
# Select first photo in library
- tapOn:
    index: 0

# Upload After photo
- tapOn: "After"
- tapOn: "Photo Library"
- tapOn:
    index: 0

# Upload Proof photo
- tapOn: "Proof"
- tapOn: "Photo Library"
- tapOn:
    index: 0

# All 3 uploaded — submit button shows "Review & Submit"
- assertVisible:
    text: "Review & Submit"

- tapOn: "Review & Submit"
- assertVisible: "Submit Work"

# Submit
- tapOn: "Submit Work"
- assertVisible: "Submit Work"
- tapOn: "Submit Now"

# Success
- assertVisible:
    text: "Submitted"
- takeScreenshot: "05_worker_submit_task"
