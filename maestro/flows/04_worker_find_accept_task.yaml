# FLOW 4: Worker Finds and Accepts a Task
# Tests: login → Find Work tab → task visible → tap task → accept → reach ActiveTask

appId: com.eclean.app
---
- launchApp:
    clearState: true
- assertVisible: "Sign In"

# Worker login
- tapOn:
    text: "Email"
- inputText: "${WORKER_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${PASSWORD}"
- tapOn: "Sign In"

# Navigate to Find Work tab
- assertVisible:
    text: "Home"
- tapOn: "Find Work"

# Map + bottom sheet loads
- assertVisible:
    text: "tasks nearby"

# Tap first task in list
- tapOn:
    text: ".*drain.*|.*clean.*|.*task.*"
    regex: true

# Task Detail screen
- assertVisible:
    text: "Accept"

# Note: Acceptance only works if worker has no active task
# Tap Accept
- tapOn:
    text: "Accept"

# Confirmation dialog
- assertVisible: "Accept Task"
- tapOn: "Accept"

# Should navigate to Active Task screen
- assertVisible:
    text: "Start Work"
- takeScreenshot: "04_worker_accept_task"
