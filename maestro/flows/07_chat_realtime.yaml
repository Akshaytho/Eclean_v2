# FLOW 7: Real-time Chat Between Buyer and Worker
# Tests: worker opens chat → sends message → verify it appears

appId: com.eclean.app
---
- launchApp:
    clearState: true
- assertVisible: "Sign In"

- tapOn:
    text: "Email"
- inputText: "${WORKER_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${PASSWORD}"
- tapOn: "Sign In"

# Go to My Tasks
- assertVisible:
    text: "Home"
- tapOn: "My Tasks"

# Find an active task
- tapOn:
    index: 0

# Tap Chat button
- tapOn: "Chat"
- assertVisible: "Live chat"

# Send a message
- tapOn:
    text: "Type a message"
- inputText: "Hello! I am on my way to the task location."
- tapOn:
    id: ".*send.*"

# Message should appear in chat
- assertVisible: "Hello! I am on my way"
- takeScreenshot: "07_chat_message_sent"
