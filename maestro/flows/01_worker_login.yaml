# FLOW 1: Worker Login
# Tests: app launches → login screen visible → enter credentials → reach Worker Home

appId: com.eclean.app
---
# App launches and shows login
- launchApp:
    clearState: true
- waitForAnimationToEnd
- tapOn:
    text: "Skip"
    optional: true
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 30000
- assertVisible: "Sign In"

# Screenshot: confirm Sign In screen loaded
- takeScreenshot: "debug_01a_signin_screen"

# Fill credentials
- tapOn:
    text: "Email"
- inputText: "${WORKER_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${PASSWORD}"

# Screenshot: credentials filled before submit
- takeScreenshot: "debug_01b_credentials_filled"

# Submit
- tapOn:
    text: "Sign In"

# Wait for response — app may load home or show error
- waitForAnimationToEnd
- takeScreenshot: "debug_01c_after_login_tap"

# Wait longer for home screen
- extendedWaitUntil:
    visible: "Worker"
    timeout: 20000
- takeScreenshot: "debug_01d_home_screen"

# Worker Home should appear after login
- assertVisible:
    text: "Worker"
- takeScreenshot: "01_worker_login_success"
