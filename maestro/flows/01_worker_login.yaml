# FLOW 1: Worker Login
# Tests: app launches → login screen visible → enter credentials → reach Worker Home

appId: com.eclean.app
---
# App launches and shows login
- launchApp:
    clearState: true
- extendedWaitUntil:
    anyOf:
      - visible: "Sign In"
      - visible: "Skip"
    timeout: 30000
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 15000
- assertVisible: "Sign In"

# Fill credentials
- tapOn:
    text: "Email"
- inputText: "${WORKER_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${PASSWORD}"

# Submit
- tapOn:
    text: "Sign In"

# Worker Home should appear after login
- assertVisible:
    text: "Worker"
- takeScreenshot: "01_worker_login_success"
