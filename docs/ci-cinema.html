<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI Cinema</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8e8f0;--muted:#6b6b80;--green:#00e676;--red:#ff4f4f;--blue:#4f9eff;--amber:#ffb347;--purple:#b388ff;--font-display:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
.shell{max-width:860px;margin:0 auto;padding:2rem 1.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.logo{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.status-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:4px 12px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.setup-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.setup-title{font-family:var(--font-display);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem}
.setup-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.setup-row:last-child{margin-bottom:0}
.setup-lbl{font-size:11px;color:var(--muted);width:55px;flex-shrink:0}
input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--font-mono);font-size:12px;color:var(--text);outline:none;transition:border-color .2s}
input:focus{border-color:var(--blue)}
input::placeholder{color:var(--muted)}
.btn{padding:8px 18px;font-family:var(--font-mono);font-size:12px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#000;font-weight:500}
.btn.primary:hover{opacity:.85}
.btn.sm{font-size:11px;padding:5px 10px}
.repo-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 10px;margin-bottom:1rem}
.repo-tag span{color:var(--blue);font-weight:500}
.run-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.run-card:hover{border-color:var(--border2)}
.run-card.is-fail{border-color:rgba(255,79,79,.25)}
.run-card.is-ok{border-color:rgba(0,230,118,.15)}
.run-card.is-run{border-color:rgba(79,158,255,.25);animation:glow 2s ease-in-out infinite alternate}
@keyframes glow{from{background:transparent}to{background:rgba(79,158,255,.02)}}
.run-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.run-icon{font-size:15px;width:20px;flex-shrink:0}
.run-name{font-family:var(--font-display);font-size:13px;font-weight:600}
.run-commit{font-size:10px;color:var(--muted);font-family:var(--font-mono)}
.run-ago{font-size:10px;color:var(--muted)}
.badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:500;letter-spacing:.03em}
.badge-ok{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.badge-fail{background:rgba(255,79,79,.15);color:var(--red);border:1px solid rgba(255,79,79,.2)}
.badge-run{background:rgba(79,158,255,.15);color:var(--blue);border:1px solid rgba(79,158,255,.2)}
.badge-pend{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.prog-wrap{height:2px;background:var(--border);margin:0 14px 8px;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .6s}
.steps-panel{display:none;border-top:1px solid var(--border);padding:10px 14px}
.steps-panel.open{display:block}
.job-name{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 5px;display:flex;align-items:center;gap:6px}
.job-name::after{content:'';flex:1;height:1px;background:var(--border)}
.step{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-icon{font-size:12px;width:18px;flex-shrink:0}
.step-name{flex:1;font-size:11px;color:var(--text)}
.step-dur{font-size:10px;color:var(--muted)}
.ai-box{background:var(--surface);border:1px solid rgba(179,136,255,.2);border-radius:12px;margin-top:1.5rem;overflow:hidden}
.ai-head{padding:10px 14px;background:rgba(179,136,255,.07);font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--purple);display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.08em}
.ai-body{padding:14px}
.err-box{font-family:var(--font-mono);font-size:11px;background:rgba(255,79,79,.08);border:1px solid rgba(255,79,79,.2);border-radius:8px;padding:10px 12px;color:var(--red);margin-bottom:12px;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.fix-text{font-size:12px;color:var(--text);line-height:1.75;margin-bottom:12px}
.file-tag{font-size:11px;color:var(--muted);margin-bottom:12px}
.file-tag code{color:var(--amber);font-family:var(--font-mono)}
.fix-actions{display:flex;gap:8px;flex-wrap:wrap}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:12px;line-height:2}
.autobar{text-align:center;padding:6px 0;font-size:10px;color:var(--muted)}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="logo"><div class="logo-icon">🎬</div>CI Cinema</div>
    <div class="status-pill"><span class="live-dot"></span><span id="status-txt">ready</span></div>
  </div>
  <div class="setup-card" id="setup-card">
    <div class="setup-title">Connect a repo</div>
    <div class="setup-row"><span class="setup-lbl">repo</span><input id="repo-inp" placeholder="owner/repo  e.g. Akshaytho/Eclean_v2" /></div>
    <div class="setup-row"><span class="setup-lbl">token</span><input id="token-inp" type="password" placeholder="ghp_..." /></div>
    <div class="setup-row" style="justify-content:flex-end"><button class="btn primary" onclick="startWatch()">Watch CI →</button></div>
  </div>
  <div id="repo-tag" style="display:none"></div>
  <div id="pipeline"></div>
  <div id="autobar" class="autobar"></div>
  <div id="ai-box" class="ai-box" style="display:none">
    <div class="ai-head">✦ AI fix engine<span id="ai-spin" style="display:none"><span class="spin"></span></span></div>
    <div class="ai-body" id="ai-body"></div>
  </div>
</div>
<script>
let REPO='',TOKEN='',openMap={},refreshTimer=null,lastFailedJobId=null
function startWatch(){
  REPO=document.getElementById('repo-inp').value.trim()
  TOKEN=document.getElementById('token-inp').value.trim()
  if(!REPO||!TOKEN){alert('Enter repo and token');return}
  document.getElementById('setup-card').style.display='none'
  document.getElementById('repo-tag').style.display='block'
  document.getElementById('repo-tag').innerHTML=`<div class="repo-tag">📦 <span>${REPO}</span> <button class="btn sm" onclick="document.getElementById('setup-card').style.display='block'">change</button></div>`
  document.getElementById('pipeline').innerHTML='<div class="empty"><span class="spin"></span><br><br>Loading runs...</div>'
  fetchCI()
}
function icon(s,c){
  if(s==='completed')return c==='success'?'✅':c==='failure'?'❌':c==='skipped'?'⏭':'⚪'
  if(s==='in_progress')return '🔄'
  return '⏳'
}
function cardClass(s,c){if(s==='in_progress')return 'is-run';if(c==='success')return 'is-ok';if(c==='failure')return 'is-fail';return ''}
function badgeClass(s,c){if(s==='in_progress')return 'badge-run';if(c==='success')return 'badge-ok';if(c==='failure')return 'badge-fail';return 'badge-pend'}
function badgeText(s,c){if(s==='in_progress')return 'running';if(c==='success')return 'passed';if(c==='failure')return 'failed';return s||'queued'}
function ago(ts){const s=Math.floor((Date.now()-new Date(ts))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';return Math.floor(s/3600)+'h ago'}
function dur(step){if(!step.started_at||!step.completed_at)return '';const s=Math.round((new Date(step.completed_at)-new Date(step.started_at))/1000);if(s<=0)return '';return s>=60?Math.floor(s/60)+'m '+(s%60?s%60+'s':''):s+'s'}
async function gh(path){const r=await fetch(`https://api.github.com/repos/${REPO}/${path}`,{headers:{Authorization:`token ${TOKEN}`}});if(!r.ok)throw new Error(`${r.status} ${r.statusText}`);return r.json()}
async function fetchCI(){
  clearTimeout(refreshTimer)
  document.getElementById('status-txt').textContent='fetching...'
  try{
    const runs=(await gh('actions/runs?per_page=6')).workflow_runs||[]
    if(!runs.length){document.getElementById('pipeline').innerHTML='<div class="empty">No workflow runs found</div>';document.getElementById('status-txt').textContent='no runs';return}
    const jobsList=await Promise.all(runs.map(r=>gh(`actions/runs/${r.id}/jobs`)))
    renderPipeline(runs,jobsList)
    const failIdx=runs.findIndex(r=>r.status==='completed'&&r.conclusion==='failure')
    if(failIdx>=0){const fj=(jobsList[failIdx].jobs||[]).find(j=>j.conclusion==='failure');if(fj&&fj.id!==lastFailedJobId){lastFailedJobId=fj.id;analyzeWithAI(runs[failIdx],fj)}}
    else document.getElementById('ai-box').style.display='none'
    const hasRunning=runs.some(r=>r.status==='in_progress'||r.status==='queued')
    document.getElementById('status-txt').textContent=hasRunning?'live':'idle'
    document.getElementById('autobar').textContent=hasRunning?'↻ auto-refreshing every 30s':''
    if(hasRunning)refreshTimer=setTimeout(fetchCI,30000)
  }catch(e){document.getElementById('pipeline').innerHTML=`<div class="empty">Error: ${e.message}</div>`;document.getElementById('status-txt').textContent='error'}
}
function renderPipeline(runs,jobsList){
  const html=runs.map((run,i)=>{
    const jobs=jobsList[i].jobs||[]
    const total=jobs.reduce((a,j)=>a+(j.steps||[]).filter(s=>s.status!=='skipped').length,0)
    const done=jobs.reduce((a,j)=>a+(j.steps||[]).filter(s=>s.conclusion==='success').length,0)
    const pct=total>0?Math.round(done/total*100):0
    const pcol=run.conclusion==='failure'?'var(--red)':run.status==='in_progress'?'var(--blue)':'var(--green)'
    const isOpen=openMap[run.id]
    const stepsHtml=jobs.map(job=>{
      const steps=(job.steps||[]).filter(s=>s.status&&s.status!=='skipped')
      if(!steps.length)return ''
      return `<div class="job-name">${job.name}</div>${steps.map(s=>`<div class="step"><span class="step-icon">${icon(s.status,s.conclusion)}</span><span class="step-name">${s.name}</span><span class="step-dur">${dur(s)}</span></div>`).join('')}`
    }).join('')
    const sha=run.head_commit?.id?.slice(0,7)||''
    const msg=(run.head_commit?.message?.split('\n')[0]||'').slice(0,45)
    return `<div class="run-card ${cardClass(run.status,run.conclusion)}">
      <div class="run-head" onclick="toggle(${run.id})">
        <span class="run-icon">${icon(run.status,run.conclusion)}</span>
        <div style="flex:1;min-width:0"><div class="run-name">${run.name}</div><div class="run-commit">${sha} · ${msg}</div></div>
        <span class="run-ago">${ago(run.updated_at)}</span>
        <span class="badge ${badgeClass(run.status,run.conclusion)}">${badgeText(run.status,run.conclusion)}</span>
      </div>
      ${run.status==='in_progress'?`<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${pcol}"></div></div>`:''}
      <div class="steps-panel ${isOpen?'open':''}" id="steps-${run.id}">${stepsHtml||'<div style="font-size:11px;color:var(--muted);padding:6px 0">No steps yet</div>'}</div>
    </div>`
  }).join('')
  document.getElementById('pipeline').innerHTML=html
}
function toggle(id){openMap[id]=!openMap[id];const el=document.getElementById(`steps-${id}`);if(el)el.classList.toggle('open',openMap[id])}
async function analyzeWithAI(run,failedJob){
  const box=document.getElementById('ai-box'),body=document.getElementById('ai-body'),spin=document.getElementById('ai-spin')
  box.style.display='block';spin.style.display='inline'
  body.innerHTML='<div class="fix-text">Analyzing failure...</div>'
  try{
    const logsRes=await fetch(`https://api.github.com/repos/${REPO}/actions/jobs/${failedJob.id}/logs`,{headers:{Authorization:`token ${TOKEN}`}})
    const logs=await logsRes.text()
    const errorLines=logs.split('\n').filter(l=>/error:|FAILED|Exception|Cannot|not found|assert/i.test(l)&&!/##\[debug\]/.test(l)).slice(0,15).map(l=>l.replace(/^\d{4}-\d{2}-\d{2}T[\d:.]+Z\s+/,'').trim()).join('\n')
    const failedStep=(failedJob.steps||[]).find(s=>s.conclusion==='failure')
    const aiRes=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:'You are a CI/CD expert. Return ONLY valid JSON: {"error_summary":"one line","fix":"2-3 sentences","file":"filename or null","confidence":"high|medium|low"}',messages:[{role:'user',content:`Repo: ${REPO}\nFailed step: "${failedStep?.name}"\n\nErrors:\n${errorLines}`}]})})
    const aiData=await aiRes.json()
    const raw=aiData.content?.[0]?.text||'{}'
    let p;try{p=JSON.parse(raw.replace(/```json|```/g,'').trim())}catch{p={error_summary:'Parse error',fix:raw,confidence:'low'}}
    const cc=p.confidence==='high'?'rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.2)':p.confidence==='medium'?'rgba(255,179,71,.15);color:var(--amber);border:1px solid rgba(255,179,71,.2)':'rgba(255,79,79,.15);color:var(--red);border:1px solid rgba(255,79,79,.2)'
    body.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:10px;color:var(--muted)">failed step:</span>
        <code style="font-size:10px;color:var(--text)">${failedStep?.name||'unknown'}</code>
        <span style="margin-left:auto;font-size:10px;padding:2px 8px;border-radius:99px;background:${cc}">${p.confidence} confidence</span>
      </div>
      <div class="err-box">${p.error_summary}</div>
      <div class="fix-text">${p.fix}</div>
      ${p.file?`<div class="file-tag">→ <code>${p.file}</code></div>`:''}
      <div class="fix-actions">
        <a href="https://claude.ai" target="_blank" class="btn primary">Open Claude to fix →</a>
        <button class="btn" onclick="fetchCI()">Re-check CI</button>
      </div>`
  }catch(e){body.innerHTML=`<div class="fix-text" style="color:var(--muted)">Could not analyze: ${e.message}</div>`}
  spin.style.display='none'
}
</script>
</body>
</html>
